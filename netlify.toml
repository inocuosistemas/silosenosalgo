[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  # Pinned to match .nvmrc — keeps local and Netlify in sync
  NODE_VERSION = "22"
  # recharts has react-is as transitive peer dep that npm strict mode rejects
  NPM_FLAGS    = "--legacy-peer-deps"

# SPA fallback: any unknown route serves index.html (status 200 keeps URL)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Hashed Vite assets are immutable — cache forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html must always be revalidated so users see new deploys
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Baseline security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), camera=(), microphone=()"
